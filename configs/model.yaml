model_name: hierarchical_linear
model_version: v001
dataset_version: v001
baseline_result_version: v001
expected_label_rows: 71
target_column: dft_deprot_electronic_kcal
baseline_column: xtb_deprot_kcal
lower_is_better: true

family_terms: [skeleton, axis_a_family, axis_b_family]
include_size: false
size_column: n_electrons

slope:
  free: true
  prior_center: 1.0
  penalty: 0.0

regularization:
  shared_family_coarse_grid: [0.1, 1.0, 10.0, 100.0, 1000.0]
  axis_specific_refinement: true
  lambda_skeleton_grid: [0.1, 1.0, 10.0, 100.0]
  lambda_axis_a_grid: [0.1, 1.0, 10.0, 100.0, 1000.0]
  lambda_axis_b_grid: [0.1, 1.0, 10.0, 100.0, 1000.0]

bootstrap:
  development_repeats: 200
  final_repeats: 2000
  seed: 20260722
  regularization_policy: fixed_from_nested_cv

unknown_family_policy: zero_effect
skeleton_policy: inactive_if_single_level

inner_cv:
  folds: 5
  seed: 20260722

numerical:
  condition_number_threshold: 1.0e12
